<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混練應用程式網站 2.5 (MX Application Index 2.5)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* ---------------------------------- */
        /* 1. 基本設定與佈局 */
        /* ---------------------------------- */

        body {
            background-color: #A9A9A9; 
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 30px 10px;
            margin: 0;
            min-height: 100vh;
            position: relative; /* 為了讓右上角按鈕定位 */
        }

        /* 新增：右上角清除按鈕樣式 */
        #home-clear-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.5;
            transition: all 0.3s;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #home-clear-btn:hover {
            opacity: 1;
            color: #dc3545;
        }

        #home-clear-btn span {
            font-size: 10px;
            margin-top: 2px;
            font-weight: bold;
        }

        .header-container {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 720px;
        }

        h1 {
            color: #444;
            margin: 0;
            font-size: 30px; 
        }
        .subheader {
            color: #666;
            font-size: 18px;
            margin-top: 5px;
        }
        
        .button-grid {
            display: flex;
            flex-wrap: wrap; 
            width: 720px; 
            gap: 60px; 
            justify-content: center;
            margin-bottom: 40px; 
        }

        /* ---------------------------------- */
        /* 2. 主頁按鈕樣式 */
        /* ---------------------------------- */

        .btn-style {
            width: 200px;
            height: 200px;
            text-decoration: none; 
            color: #fff; 
            border-radius: 20px; 
            cursor: pointer;
            box-sizing: border-box; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 0 #D46900; 
            transition: transform 0.1s, box-shadow 0.1s;
            background: linear-gradient(to bottom, #FF8C00, #FF7F00); 
        }

        .btn-style:hover {
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #D46900;
        }

        .btn-style:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #D46900;
        }

        .btn-style::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.1) 100%);
            pointer-events: none;
        }

        .btn-icon {
            font-size: 80px; 
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2); 
        }
        
        .btn-text {
            font-size: 16px; font-weight: bold; line-height: 1.2; padding: 0 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4); 
        }
        
        /* ---------------------------------- */
        /* 3. 設定與 Modal 樣式 */
        /* ---------------------------------- */
        #settings-btn {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            border-radius: 50%; background-color: #555; color: white; border: none;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        .modal {
            display: none; position: fixed; z-index: 101; left: 0; top: 0;
            width: 100%; height: 100%; overflow-y: auto; background-color: rgba(0,0,0,0.6); 
        }

        .modal-content {
            background-color: #fefefe; margin: 5% auto; padding: 30px;
            border: 1px solid #888; width: 90%; max-width: 600px;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .new-btn-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; }
        
        #save-and-return-btn {
            grid-column: 1 / 3; padding: 12px 10px; background-color: #007bff; color: white;
            border: none; cursor: pointer; border-radius: 4px; margin-top: 20px; font-weight: bold;
        }

        .new-btn-form button[type="submit"] {
            grid-column: 1 / 3; padding: 12px 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer;
        }

        .setting-item {
            display: flex; align-items: center; margin-bottom: 10px; padding: 10px;
            border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9; flex-wrap: wrap; 
        }

        .setting-item input[type="text"] { flex-grow: 1; padding: 8px; margin-right: 10px; border: 1px solid #ddd; border-radius: 4px; }

        .delete-btn { background-color: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        /* ---------------------------------- */
        /* 4. 手機模式優化 (RWD) */
        /* ---------------------------------- */
        @media (max-width: 768px) {
            #home-clear-btn { top: 10px; right: 10px; }
            .button-grid { width: 100%; max-width: 480px; gap: 20px; padding: 0 10px; }
            .btn-style { width: calc(50% - 10px); height: 140px; border-radius: 15px; }
            .btn-icon { font-size: 50px; }
            .btn-text { font-size: 14px; }
            .modal-content { margin: 0; width: 100%; min-height: 100vh; border-radius: 0; }
            .setting-item input[type="text"] { width: 100%; margin-right: 0; margin-bottom: 5px; }
            .setting-item .delete-btn { width: 80%; margin: 10px auto 5px auto; display: block; }
        }
    </style>
</head>
<body>

    <button id="home-clear-btn" onclick="clearAllData()" title="清除所有資料並恢復預設">
        <i class="fa-solid fa-trash-can"></i>
        <span>重置</span>
    </button>

    <div class="header-container">
        <h1>🏢 混練應用程式索引 2.5</h1>
        <div class="subheader">MIXING Application Index 2.5</div>
    </div>

    <div class="button-grid" id="button-grid"></div>
    
    <button id="settings-btn" onclick="authenticateAndOpenModal()">
        <i class="fas fa-cog"></i>
    </button>
    
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>⚙️ 設定管理</h2> 

            <form id="new-btn-form" class="new-btn-form">
                <div>
                    <label>英文名稱</label>
                    <input type="text" id="new-en-name" placeholder="Machine-NG" required>
                </div>
                <div>
                    <label>中文名稱</label>
                    <input type="text" id="new-cn-name" placeholder="機械管理 (選填)">
                </div>
                <div style="grid-column: 1 / 3;">
                    <label>網址連結</label>
                    <input type="text" id="new-url" placeholder="https://..." required>
                </div>
                <button type="submit">新增按鈕</button>
            </form>
            
            <hr>

            <h3>管理現有按鈕</h3>
            <div id="settings-list"></div>
            
            <button id="save-and-return-btn" onclick="savePasswordAndClose()">
                <i class="fas fa-save"></i> 儲存並返回
            </button>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = "1429"; 
        const STORAGE_KEY = 'departmentalAppButtonsV2';
        const STORED_PASSWORD_KEY = 'settingsStoredPassword';

        const defaultButtons = [
            { en: "Machine-NG MX", cn: "機械故障資訊", url: "https://dereklin1429.github.io/Machine-NG-MX/", icon: "fa-arrow-right" },
            { en: "5S Audit MX", cn: "混練 5S 查核", url: "https://dereklin1429.github.io/5S-audit_MX/", icon: "fa-arrow-circle-right" },
            { en: "MX_123 History", cn: "混練一二三級保養", url: "https://dereklin1429.github.io/Repair-History-MX/", icon: "fa-play" },
            { en: "M/C_maintenance MX", cn: "設備保養查核", url: "https://dereklin1429.github.io/M-C-maintenance-MX/", icon: "fa-angle-double-right" },
            { en: "Mixing Inventory", cn: "混練盤點", url: "https://dereklin1429.github.io/Mixing-Inventory-V3/", icon: "fa-caret-right" },
            { en: "WET TEST", cn: "WET試車紀錄", url: "https://dereklin1429.github.io/MCWETTEST01/", icon: "fa-list-check" },
             { en: "SCRAP DATA", cn: "材料報廢紀錄", url: "https://dereklin1429.github.io/Monthly-Scrap-Data-Statistics-V3.0/", icon: "fa-book" },
             { en: "SPC RM Info", cn: "材料規格資訊", url: "https://dereklin1429.github.io/Spec-and-raw-material-searcher/", icon: "fa-book" },
            { en: "Daily Scrap Report", cn: "每日報廢資料", url: "http://dereklin1429.github.io/Scrap-everyday-update-V4/", icon: "fa-book" }
        ];

        let appButtons = [];
        const buttonGrid = document.getElementById('button-grid');
        const newBtnForm = document.getElementById('new-btn-form');
        const settingsModal = document.getElementById('settingsModal');

        function loadButtons() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                appButtons = JSON.parse(saved);
            } else {
                appButtons = [...defaultButtons];
                saveButtons();
            }
            renderMainButtons();
        }

        function saveButtons() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appButtons));
        }

        function renderMainButtons() {
            buttonGrid.innerHTML = ''; 
            appButtons.forEach(btn => {
                let nameToDisplay = btn.en + (btn.cn ? `<br>(${btn.cn.trim()})` : '');
                const link = document.createElement('a');
                link.className = 'btn-style'; 
                link.href = btn.url;
                link.target = '_blank';
                link.innerHTML = `<i class="fas ${btn.icon} btn-icon"></i><span class="btn-text">${nameToDisplay}</span>`;
                buttonGrid.appendChild(link);
            });
        }
        
        function renderSettingsList() {
            const settingsList = document.getElementById('settings-list');
            settingsList.innerHTML = '';
            appButtons.forEach((btn, index) => {
                const item = document.createElement('div');
                item.className = 'setting-item';
                item.innerHTML = `
                    <input type="text" value="${btn.en}" onchange="updateButton(${index}, 'en', this.value)">
                    <input type="text" value="${btn.cn || ''}" onchange="updateButton(${index}, 'cn', this.value)">
                    <input type="text" value="${btn.url}" onchange="updateButton(${index}, 'url', this.value)">
                    <button class="delete-btn" onclick="deleteButton(${index})">刪除</button>
                `;
                settingsList.appendChild(item);
            });
        }

        newBtnForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const enName = document.getElementById('new-en-name').value.trim();
            const cnName = document.getElementById('new-cn-name').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const randomIcons = ["fa-rocket", "fa-bolt", "fa-star", "fa-check-circle"];
            const icon = randomIcons[Math.floor(Math.random() * randomIcons.length)];
            appButtons.push({ en: enName, cn: cnName, url, icon });
            saveButtons();
            renderMainButtons();
            renderSettingsList();
            newBtnForm.reset();
        });

        function deleteButton(index) {
            if (confirm(`確定要刪除嗎？`)) {
                appButtons.splice(index, 1);
                saveButtons();
                renderMainButtons();
                renderSettingsList();
            }
        }

        function updateButton(index, field, value) {
            appButtons[index][field] = value.trim();
            saveButtons();
            renderMainButtons();
        }

        function authenticateAndOpenModal() {
            const storedPassword = localStorage.getItem(STORED_PASSWORD_KEY);
            if (storedPassword === DEFAULT_PASSWORD || prompt("請輸入管理密碼：") === DEFAULT_PASSWORD) {
                renderSettingsList();
                settingsModal.style.display = "block";
            } else {
                alert("密碼錯誤！");
            }
        }

        function closeModal() { settingsModal.style.display = "none"; }

        function savePasswordAndClose() {
            if (confirm("是否儲存密碼以供下次自動登入？")) {
                localStorage.setItem(STORED_PASSWORD_KEY, DEFAULT_PASSWORD);
            }
            closeModal();
        }

        // 清除所有資料函數
        function clearAllData() {
            if (confirm("⚠️ 警告：這將清除所有自定義按鈕與存檔密碼，並恢復為初始設定。確定嗎？")) {
                localStorage.clear();
                alert("資料已重置。");
                location.reload();
            }
        }

        window.onclick = (e) => { if (e.target == settingsModal) closeModal(); }
        loadButtons();
    </script>
</body>
</html>
